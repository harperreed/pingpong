# ABOUTME: GoReleaser config building macOS binaries for pingpong and
# ABOUTME: publishing its Homebrew formula to harperreed/homebrew-tap.
version: 2

project_name: pingpong

builds:
  - id: pingpong
    builder: rust
    binary: pingpong
    tool: cargo
    # The Rust builder's `command` defaults to `zigbuild` (cargo-zigbuild),
    # which is not installed on the macOS CI runner. Force plain `cargo build`
    # — the macOS-only, native-toolchain path this pipeline is scoped to.
    command: build
    flags:
      - --release
    targets:
      - x86_64-apple-darwin
      - aarch64-apple-darwin

archives:
  - id: pingpong
    formats: [tar.gz]
    # GoReleaser renders Go-style arch (amd64/arm64); map amd64 -> x86_64 to
    # match the existing tap asset names (Darwin_x86_64 / Darwin_arm64).
    name_template: 'pingpong_{{ .Version }}_Darwin_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}'

checksum:
  name_template: "checksums.txt"

brews:
  - name: pingpong
    repository:
      owner: harperreed
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    # Homebrew ignores a root-level formula when a Formula/ dir exists, and the
    # rest of the tap lives in Formula/. Match it so `brew install` resolves.
    directory: Formula
    homepage: "https://github.com/harperreed/pingpong"
    description: "A beautiful TUI ping utility for monitoring network connectivity"
    license: "MIT"
    test: |
      system "#{bin}/pingpong", "--help"

release:
  github:
    owner: harperreed
    name: pingpong
